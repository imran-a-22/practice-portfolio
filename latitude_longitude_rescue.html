<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Latitude Longitude Rescue</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#e8dcc6;color:#2f2416;font-family:"Trebuchet MS",Arial,sans-serif;display:flex;align-items:center;justify-content:center;padding:20px}.atlas{width:min(1080px,100%);background:#fff4d6;border:8px solid #6b4f2a;border-radius:14px;box-shadow:0 24px 60px #36230c66;padding:24px}h1{margin:0;font-size:38px}.layout{display:grid;grid-template-columns:1.1fr .9fr;gap:18px;margin-top:18px}.map{min-height:420px;background:#d5f0f6;border:4px solid #6b4f2a;border-radius:8px;position:relative;overflow:hidden;background-image:linear-gradient(#2f241633 1px,transparent 1px),linear-gradient(90deg,#2f241633 1px,transparent 1px);background-size:20% 20%}.land{position:absolute;border-radius:45% 55%;background:#87b96c;border:2px solid #547d37}.l1{left:60px;top:70px;width:170px;height:130px;transform:rotate(-12deg)}.l2{right:80px;top:95px;width:180px;height:145px;transform:rotate(18deg)}.l3{left:220px;bottom:70px;width:240px;height:140px;transform:rotate(7deg)}.target{position:absolute;width:30px;height:30px;transform:translate(-50%,-50%);border:4px solid #c1121f;border-radius:50%;background:#ffffffcc;box-shadow:0 0 0 7px #c1121f33}.panel{background:#ffffff88;border:3px solid #6b4f2a;border-radius:8px;padding:18px}.hud{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.stat{background:#ead7aa;border-radius:8px;text-align:center;padding:10px}.stat b{display:block;font-size:24px;color:#8a281f}.mission{font-size:22px;line-height:1.45;background:#fff9e8;border-left:7px solid #8a281f;padding:14px;border-radius:8px;margin:14px 0}.choices{display:grid;gap:10px}button{border:2px solid #6b4f2a;background:#fff9e8;border-radius:8px;padding:12px;font-weight:bold;cursor:pointer}button:hover{background:#ead7aa}.feedback{min-height:70px;background:#fff9e8;padding:12px;border-radius:8px;margin-top:12px;line-height:1.5}.lesson{color:#6b4f2a;line-height:1.5}@media(max-width:850px){.layout{grid-template-columns:1fr}.hud{grid-template-columns:1fr}}</style></head><body><main class="atlas"><h1>Latitude Longitude Rescue</h1><p>Use coordinates to find rescue teams. Latitude is north/south. Longitude is east/west.</p><section class="layout"><div class="map"><div class="land l1"></div><div class="land l2"></div><div class="land l3"></div><div class="target" id="target"></div></div><div class="panel"><div class="hud"><div class="stat">Score<b id="score">0</b></div><div class="stat">Fuel<b id="fuel">3</b></div><div class="stat">Mission<b id="missionNo">1</b></div></div><div class="mission" id="mission"></div><div class="choices" id="choices"></div><div class="feedback" id="feedback">Choose the coordinate.</div><button onclick="next()">Next Mission</button> <button onclick="resetGame()">Reset</button></div></section><p class="lesson"><b>Mini lesson:</b> Coordinates are written latitude first, longitude second. Example: 40°N, 30°E.</p></main><script>const m=[['Team Alpha is north of the Equator and east of the Prime Meridian.','40°N, 30°E',80,20,'North is above; east is right.'],['Team Beta is south and west.','20°S, 60°W',20,80,'South is below; west is left.'],['Team Gamma is on the Equator and west.','0°, 30°W',40,60,'The Equator is 0° latitude.'],['Team Delta is north and west.','20°N, 60°W',20,40,'20°N is above and 60°W is left.']];const opts=['40°N, 30°E','20°S, 60°W','0°, 30°W','20°N, 60°W','20°S, 30°E'];let score=0,fuel=3,i=0,answered=false;function sh(a){return[...a].sort(()=>Math.random()-.5)}function render(){answered=false;let x=m[i%m.length];mission.textContent=x[0];target.style.left=x[2]+'%';target.style.top=x[3]+'%';document.getElementById('score').textContent=score;document.getElementById('fuel').textContent=fuel;missionNo.textContent=i%m.length+1;feedback.textContent='Choose the coordinate.';choices.innerHTML='';sh([x[1],...sh(opts.filter(o=>o!==x[1])).slice(0,3)]).forEach(o=>{let b=document.createElement('button');b.textContent=o;b.onclick=()=>pick(o);choices.appendChild(b)})}function pick(o){if(answered||fuel<=0)return;answered=true;let x=m[i%m.length];if(o===x[1]){score+=10;feedback.innerHTML='<b>Rescue successful.</b> '+x[4]}else{fuel--;feedback.innerHTML='<b>Wrong location.</b> Correct answer: '+x[1]+'. '+x[4];if(fuel<=0)feedback.innerHTML+='<br><b>Fuel empty.</b>'}document.getElementById('score').textContent=score;document.getElementById('fuel').textContent=fuel}function next(){if(fuel<=0)return;i++;render()}function resetGame(){score=0;fuel=3;i=0;render()}render();</script></body></html>
