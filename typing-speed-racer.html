<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing Speed Racer</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #030712;
    --track: #0f172a;
    --neon: #00f5ff;
    --neon2: #ff006e;
    --neon3: #adff2f;
    --panel: rgba(0,245,255,0.05);
    --border: rgba(0,245,255,0.2);
    --text: #e2e8f0;
    --dim: #64748b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }
  /* Grid background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1rem;
    position: relative;
    z-index: 1;
  }
  h1 {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(1.8rem, 5vw, 3rem);
    text-align: center;
    letter-spacing: 0.15em;
    color: var(--neon);
    text-shadow: 0 0 20px var(--neon), 0 0 60px rgba(0,245,255,0.3);
    margin-bottom: 0.3rem;
  }
  .subtitle {
    text-align: center;
    color: var(--dim);
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    margin-bottom: 2rem;
  }

  /* Stats bar */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .stat-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.8rem;
    text-align: center;
  }
  .stat-label { font-size: 0.65rem; letter-spacing: 0.2em; color: var(--dim); }
  .stat-value {
    font-family: 'Orbitron', monospace;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--neon);
    text-shadow: 0 0 10px var(--neon);
  }
  .stat-unit { font-size: 0.65rem; color: var(--dim); }

  /* Track */
  .race-track {
    background: var(--track);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    position: relative;
    overflow: hidden;
  }
  .race-track::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--neon), transparent);
    animation: scanline 2s linear infinite;
  }
  @keyframes scanline {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  /* Cars on track */
  .cars-container {
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
    margin-bottom: 1.5rem;
  }
  .car-lane {
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }
  .car-label { font-size: 0.7rem; color: var(--dim); min-width: 50px; }
  .track-bar {
    flex: 1;
    height: 24px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 4px;
    position: relative;
    overflow: visible;
  }
  .track-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.15s ease;
    position: relative;
  }
  .track-fill.player { background: linear-gradient(90deg, #004d6b, var(--neon)); box-shadow: 0 0 10px var(--neon); }
  .track-fill.cpu { background: linear-gradient(90deg, #3d0022, var(--neon2)); }
  .car-icon {
    position: absolute;
    right: -14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.2rem;
  }
  .track-pct { font-size: 0.75rem; min-width: 35px; text-align: right; color: var(--dim); }

  /* Text display */
  .text-display {
    font-size: 1.1rem;
    line-height: 1.8;
    letter-spacing: 0.05em;
    padding: 1rem;
    background: rgba(0,0,0,0.3);
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.06);
    word-break: break-all;
    min-height: 80px;
  }
  .char-correct { color: var(--neon3); }
  .char-wrong { color: var(--neon2); background: rgba(255,0,110,0.2); border-radius: 2px; }
  .char-current {
    border-bottom: 2px solid var(--neon);
    animation: blink 0.8s step-end infinite;
  }
  .char-pending { color: #475569; }
  @keyframes blink { 50% { border-color: transparent; } }

  /* Input */
  #typing-input {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    padding: 0.9rem 1rem;
    outline: none;
    margin-top: 1rem;
    letter-spacing: 0.05em;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #typing-input:focus {
    border-color: var(--neon);
    box-shadow: 0 0 15px rgba(0,245,255,0.2);
  }
  #typing-input:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Buttons */
  .btn-row { display: flex; gap: 1rem; margin-top: 1.2rem; }
  .btn {
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 0.75rem 1.5rem;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .btn-primary {
    background: var(--neon);
    color: var(--bg);
    box-shadow: 0 0 20px rgba(0,245,255,0.4);
  }
  .btn-primary:hover { box-shadow: 0 0 35px rgba(0,245,255,0.7); transform: translateY(-1px); }
  .btn-secondary {
    background: transparent;
    color: var(--dim);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .btn-secondary:hover { border-color: var(--dim); color: var(--text); }

  /* Difficulty */
  .diff-row { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; align-items: center; }
  .diff-label { font-size: 0.7rem; letter-spacing: 0.2em; color: var(--dim); margin-right: 0.5rem; }
  .diff-btn {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    padding: 0.4rem 0.9rem;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent;
    color: var(--dim);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.1em;
  }
  .diff-btn.active { border-color: var(--neon); color: var(--neon); background: rgba(0,245,255,0.07); }

  /* Result overlay */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(3,7,18,0.92);
    z-index: 100;
    place-items: center;
    backdrop-filter: blur(6px);
  }
  .overlay.show { display: grid; }
  .result-card {
    background: var(--track);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 3rem;
    text-align: center;
    max-width: 420px;
    width: 90%;
    box-shadow: 0 0 60px rgba(0,245,255,0.1);
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes popIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .result-title {
    font-family: 'Orbitron', monospace;
    font-size: 1.8rem;
    font-weight: 900;
    margin-bottom: 1.5rem;
  }
  .result-win { color: var(--neon3); text-shadow: 0 0 20px var(--neon3); }
  .result-lose { color: var(--neon2); text-shadow: 0 0 20px var(--neon2); }
  .result-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 1.5rem 0; }
  .result-stat { background: rgba(255,255,255,0.04); border-radius: 8px; padding: 0.9rem; }
  .result-stat-label { font-size: 0.65rem; color: var(--dim); letter-spacing: 0.2em; }
  .result-stat-value { font-family: 'Orbitron', monospace; font-size: 1.3rem; color: var(--neon); }

  /* Progress bar overall */
  .progress-wrapper { margin-bottom: 0.5rem; }
  .progress-bar {
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    margin-top: 1rem;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--neon), var(--neon3));
    border-radius: 2px;
    transition: width 0.2s;
    box-shadow: 0 0 8px var(--neon);
  }
</style>
</head>
<body>
<div class="container">
  <h1>⚡ TYPING RACER</h1>
  <p class="subtitle">TYPE FAST · RACE HARD · WIN</p>

  <div class="diff-row">
    <span class="diff-label">SPEED CLASS:</span>
    <button class="diff-btn active" onclick="setDiff('easy')">ROOKIE</button>
    <button class="diff-btn" onclick="setDiff('medium')">PRO</button>
    <button class="diff-btn" onclick="setDiff('hard')">ELITE</button>
  </div>

  <div class="stats">
    <div class="stat-box">
      <div class="stat-label">SPEED</div>
      <div class="stat-value" id="wpm-display">0</div>
      <div class="stat-unit">WPM</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">ACCURACY</div>
      <div class="stat-value" id="acc-display">100</div>
      <div class="stat-unit">%</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">TIME</div>
      <div class="stat-value" id="time-display">60</div>
      <div class="stat-unit">SEC</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">BEST WPM</div>
      <div class="stat-value" id="best-display">0</div>
      <div class="stat-unit">RECORD</div>
    </div>
  </div>

  <div class="race-track">
    <div class="cars-container">
      <div class="car-lane">
        <span class="car-label">YOU</span>
        <div class="track-bar">
          <div class="track-fill player" id="player-bar" style="width:0%">
            <span class="car-icon">🏎️</span>
          </div>
        </div>
        <span class="track-pct" id="player-pct">0%</span>
      </div>
      <div class="car-lane">
        <span class="car-label">CPU</span>
        <div class="track-bar">
          <div class="track-fill cpu" id="cpu-bar" style="width:0%">
            <span class="car-icon">🚗</span>
          </div>
        </div>
        <span class="track-pct" id="cpu-pct">0%</span>
      </div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>

    <div class="text-display" id="text-display"></div>
    <input type="text" id="typing-input" placeholder="Click here and start typing to begin the race..." autocomplete="off" autocorrect="off" spellcheck="false">

    <div class="btn-row">
      <button class="btn btn-primary" onclick="startRace()" id="start-btn">START RACE</button>
      <button class="btn btn-secondary" onclick="resetRace()">RESET</button>
    </div>
  </div>
</div>

<!-- Result Overlay -->
<div class="overlay" id="overlay">
  <div class="result-card">
    <div class="result-title" id="result-title">YOU WIN!</div>
    <div class="result-stats">
      <div class="result-stat">
        <div class="result-stat-label">FINAL WPM</div>
        <div class="result-stat-value" id="final-wpm">0</div>
      </div>
      <div class="result-stat">
        <div class="result-stat-label">ACCURACY</div>
        <div class="result-stat-value" id="final-acc">0%</div>
      </div>
      <div class="result-stat">
        <div class="result-stat-label">ERRORS</div>
        <div class="result-stat-value" id="final-errors">0</div>
      </div>
      <div class="result-stat">
        <div class="result-stat-label">TIME</div>
        <div class="result-stat-value" id="final-time">0s</div>
      </div>
    </div>
    <div class="btn-row" style="justify-content:center">
      <button class="btn btn-primary" onclick="closeOverlay()">RACE AGAIN</button>
    </div>
  </div>
</div>

<script>
const TEXTS = [
  "The quick brown fox jumps over the lazy dog near the riverbank on a sunny afternoon.",
  "Programming is not about typing fast but thinking clearly and solving problems efficiently.",
  "A good programmer is someone who always looks both ways before crossing a one way street.",
  "Speed without accuracy is just noise. The best racers know when to push and when to control.",
  "Learning to code is learning to think in a new language where logic and creativity collide.",
  "Every keystroke matters in a race. Precision and speed together create the perfect driver.",
  "The fastest typists are not born but made through daily practice and deliberate repetition.",
  "Code is like poetry written for machines but also for the humans who will read it tomorrow.",
  "In the digital race of life typing speed is your engine and accuracy is your fuel efficiency.",
  "Master the keyboard and you master the machine. Every great developer started with the basics."
];

const CPU_WPM = { easy: 35, medium: 55, hard: 80 };
let difficulty = 'easy';
let currentText = '';
let startTime = null;
let gameTimer = null;
let cpuTimer = null;
let totalTime = 60;
let timeLeft = 60;
let totalTyped = 0;
let errors = 0;
let cpuProgress = 0;
let gameRunning = false;
let bestWpm = 0;

function setDiff(d) {
  difficulty = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

function renderText() {
  const input = document.getElementById('typing-input').value;
  let html = '';
  for (let i = 0; i < currentText.length; i++) {
    if (i < input.length) {
      if (input[i] === currentText[i]) {
        html += `<span class="char-correct">${currentText[i]}</span>`;
      } else {
        html += `<span class="char-wrong">${currentText[i]}</span>`;
      }
    } else if (i === input.length) {
      html += `<span class="char-current">${currentText[i]}</span>`;
    } else {
      html += `<span class="char-pending">${currentText[i]}</span>`;
    }
  }
  document.getElementById('text-display').innerHTML = html;
}

function calcWPM() {
  if (!startTime) return 0;
  const elapsed = (Date.now() - startTime) / 1000 / 60;
  const words = totalTyped / 5;
  return Math.round(words / Math.max(elapsed, 0.01));
}

function calcAcc() {
  if (totalTyped === 0) return 100;
  return Math.round(((totalTyped - errors) / totalTyped) * 100);
}

function updatePlayerBar() {
  const pct = Math.min((document.getElementById('typing-input').value.length / currentText.length) * 100, 100);
  document.getElementById('player-bar').style.width = pct + '%';
  document.getElementById('player-pct').textContent = Math.round(pct) + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

function startCPU() {
  cpuProgress = 0;
  const cpuSpeed = CPU_WPM[difficulty]; // words per min
  const charsPerSec = (cpuSpeed * 5) / 60;
  const variance = cpuSpeed * 0.15;

  cpuTimer = setInterval(() => {
    if (!gameRunning) { clearInterval(cpuTimer); return; }
    const jitter = (Math.random() - 0.5) * variance / 10;
    cpuProgress = Math.min(cpuProgress + (charsPerSec + jitter) * 0.1, currentText.length);
    const pct = (cpuProgress / currentText.length) * 100;
    document.getElementById('cpu-bar').style.width = pct + '%';
    document.getElementById('cpu-pct').textContent = Math.round(pct) + '%';
    if (cpuProgress >= currentText.length) {
      clearInterval(cpuTimer);
      endRace(false);
    }
  }, 100);
}

function startRace() {
  currentText = TEXTS[Math.floor(Math.random() * TEXTS.length)];
  errors = 0; totalTyped = 0; startTime = null; cpuProgress = 0; gameRunning = true;
  timeLeft = totalTime;

  document.getElementById('typing-input').value = '';
  document.getElementById('typing-input').disabled = false;
  document.getElementById('typing-input').focus();
  document.getElementById('player-bar').style.width = '0%';
  document.getElementById('cpu-bar').style.width = '0%';
  document.getElementById('player-pct').textContent = '0%';
  document.getElementById('cpu-pct').textContent = '0%';
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('wpm-display').textContent = '0';
  document.getElementById('acc-display').textContent = '100';
  document.getElementById('time-display').textContent = totalTime;
  document.getElementById('start-btn').textContent = 'RACING...';
  document.getElementById('start-btn').disabled = true;

  renderText();
  startCPU();

  gameTimer = setInterval(() => {
    timeLeft--;
    document.getElementById('time-display').textContent = timeLeft;
    if (timeLeft <= 0) {
      clearInterval(gameTimer);
      endRace(false);
    }
  }, 1000);
}

function endRace(playerWon) {
  if (!gameRunning) return;
  gameRunning = false;
  clearInterval(gameTimer);
  clearInterval(cpuTimer);
  document.getElementById('typing-input').disabled = true;
  document.getElementById('start-btn').disabled = false;
  document.getElementById('start-btn').textContent = 'START RACE';

  const wpm = calcWPM();
  const acc = calcAcc();
  const elapsed = startTime ? Math.round((Date.now() - startTime) / 1000) : 0;

  if (wpm > bestWpm) {
    bestWpm = wpm;
    document.getElementById('best-display').textContent = bestWpm;
  }

  const title = document.getElementById('result-title');
  if (playerWon) {
    title.textContent = '🏆 YOU WIN!';
    title.className = 'result-title result-win';
  } else if (document.getElementById('typing-input').value.length >= currentText.length) {
    title.textContent = '🏁 FINISHED!';
    title.className = 'result-title result-win';
  } else {
    title.textContent = '💀 CPU WINS!';
    title.className = 'result-title result-lose';
  }

  document.getElementById('final-wpm').textContent = wpm;
  document.getElementById('final-acc').textContent = acc + '%';
  document.getElementById('final-errors').textContent = errors;
  document.getElementById('final-time').textContent = elapsed + 's';
  document.getElementById('overlay').classList.add('show');
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('show');
  resetRace();
}

function resetRace() {
  clearInterval(gameTimer); clearInterval(cpuTimer);
  gameRunning = false;
  currentText = '';
  document.getElementById('typing-input').value = '';
  document.getElementById('typing-input').disabled = false;
  document.getElementById('text-display').innerHTML = '<span style="color:#334155;font-style:italic">Press START RACE to begin...</span>';
  document.getElementById('player-bar').style.width = '0%';
  document.getElementById('cpu-bar').style.width = '0%';
  document.getElementById('player-pct').textContent = '0%';
  document.getElementById('cpu-pct').textContent = '0%';
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('wpm-display').textContent = '0';
  document.getElementById('acc-display').textContent = '100';
  document.getElementById('time-display').textContent = totalTime;
  document.getElementById('start-btn').disabled = false;
  document.getElementById('start-btn').textContent = 'START RACE';
}

document.getElementById('typing-input').addEventListener('input', (e) => {
  if (!gameRunning) return;
  if (!startTime) startTime = Date.now();

  const input = e.target.value;
  totalTyped = Math.max(totalTyped, input.length);
  errors = 0;
  for (let i = 0; i < input.length; i++) {
    if (i < currentText.length && input[i] !== currentText[i]) errors++;
  }

  const wpm = calcWPM();
  const acc = calcAcc();
  document.getElementById('wpm-display').textContent = wpm;
  document.getElementById('acc-display').textContent = acc;

  renderText();
  updatePlayerBar();

  if (input === currentText) {
    clearInterval(gameTimer);
    clearInterval(cpuTimer);
    endRace(true);
  }
});

// Initialize
document.getElementById('text-display').innerHTML = '<span style="color:#334155;font-style:italic">Press START RACE to begin...</span>';
</script>
</body>
</html>
