<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prime Popper</title>
<style>
  body{margin:0;font-family:Arial,sans-serif;background:#0f172a;color:#e2e8f0;display:flex;justify-content:center;align-items:center;min-height:100vh}
  .game{width:min(900px,95vw);background:#111827;border:2px solid #334155;border-radius:18px;padding:18px;box-shadow:0 20px 50px rgba(0,0,0,.35)}
  h1{margin:0 0 6px;text-align:center}
  p{margin:4px 0 12px;text-align:center;color:#cbd5e1}
  .hud{display:flex;gap:12px;justify-content:space-between;flex-wrap:wrap;background:#1e293b;padding:10px 14px;border-radius:12px;margin-bottom:12px}
  #arena{position:relative;height:470px;background:linear-gradient(180deg,#1d4ed8,#0f172a);border-radius:14px;overflow:hidden;border:2px solid #475569}
  .bubble{position:absolute;width:74px;height:74px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:24px;color:#0f172a;cursor:pointer;user-select:none;box-shadow:inset 0 -8px 0 rgba(255,255,255,.22),0 10px 20px rgba(0,0,0,.25);transition:transform .08s}
  .bubble:hover{transform:scale(1.05)}
  .prime{background:#86efac}
  .composite{background:#fca5a5}
  .controls{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:12px}
  button{padding:10px 16px;border:none;border-radius:10px;background:#38bdf8;color:#082f49;font-weight:700;cursor:pointer}
  .info{background:#1e293b;border-radius:12px;padding:12px;margin-top:12px;color:#cbd5e1}
</style>
</head>
<body>
<div class="game">
  <h1>Prime Popper</h1>
  <p>Pop only prime numbers. Leave composite numbers alone.</p>
  <div class="hud">
    <div>Score: <strong id="score">0</strong></div>
    <div>Lives: <strong id="lives">5</strong></div>
    <div>Round: <strong id="round">1</strong></div>
    <div>Prime streak: <strong id="streak">0</strong></div>
  </div>
  <div id="arena"></div>
  <div class="controls">
    <button id="startBtn">Start / Restart</button>
  </div>
  <div class="info" id="message">Tip: A prime number has exactly two factors: 1 and itself.</div>
</div>
<script>
const arena = document.getElementById('arena');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const roundEl = document.getElementById('round');
const streakEl = document.getElementById('streak');
const messageEl = document.getElementById('message');
const startBtn = document.getElementById('startBtn');

let score=0,lives=5,round=1,streak=0,spawnTimer=null,moveTimer=null,bubbles=[];

function isPrime(n){
  if(n<2)return false;
  for(let i=2;i<=Math.sqrt(n);i++) if(n%i===0) return false;
  return true;
}
function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function updateHud(){scoreEl.textContent=score;livesEl.textContent=lives;roundEl.textContent=round;streakEl.textContent=streak;}
function clearGame(){bubbles.forEach(b=>b.el.remove());bubbles=[];clearInterval(spawnTimer);clearInterval(moveTimer);}
function startGame(){
  score=0;lives=5;round=1;streak=0;updateHud();clearGame();messageEl.textContent='Pop primes only.';
  spawnTimer=setInterval(spawnBubble,1100);
  moveTimer=setInterval(step,30);
}
function spawnBubble(){
  const n = rand(2,60);
  const prime = isPrime(n);
  const el = document.createElement('div');
  el.className='bubble '+(prime?'prime':'composite');
  el.textContent=n;
  const x = rand(0, arena.clientWidth-74);
  const speed = rand(1,3)+round*0.25;
  el.style.left=x+'px';
  el.style.top=(arena.clientHeight-80)+'px';
  el.addEventListener('click',()=>handleClick(obj));
  arena.appendChild(el);
  const obj={n,prime,el,x,y:arena.clientHeight-80,speed};
  bubbles.push(obj);
}
function handleClick(obj){
  if(obj.prime){
    score += 10 + streak*2;
    streak++;
    if(streak>0 && streak%5===0){round++; messageEl.textContent='Nice streak. Round increased.';}
  } else {
    lives--; streak=0; messageEl.textContent=`${obj.n} is composite. Example factor pair: 2 × ${obj.n/2===Math.floor(obj.n/2)&&obj.n%2===0?obj.n/2:'another divisor exists'}`;
  }
  removeBubble(obj);
  updateHud();
  checkEnd();
}
function removeBubble(obj){
  obj.el.remove();
  bubbles = bubbles.filter(b=>b!==obj);
}
function step(){
  bubbles.slice().forEach(obj=>{
    obj.y -= obj.speed;
    obj.el.style.top = obj.y+'px';
    if(obj.y < -80){
      if(obj.prime){
        lives--; streak=0; messageEl.textContent=`You missed prime ${obj.n}.`;
      }
      removeBubble(obj);
      updateHud();
      checkEnd();
    }
  });
}
function checkEnd(){
  if(lives<=0){
    clearGame();
    messageEl.textContent = `Game over. Final score: ${score}. Press Start / Restart to play again.`;
  }
}
startBtn.addEventListener('click',startGame);
updateHud();
</script>
</body>
</html>
