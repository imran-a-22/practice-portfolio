<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cyber Safety Escape Room</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#050816;color:#e6f7ff;font-family:Arial,sans-serif;display:flex;align-items:center;justify-content:center;padding:20px}.room{width:min(1050px,100%);background:radial-gradient(circle at 20% 20%,#00e5ff33,transparent 30%),radial-gradient(circle at 80% 70%,#ff009633,transparent 35%),#0b1020;border:1px solid #00e5ff88;border-radius:26px;box-shadow:0 0 40px #00e5ff44;padding:24px}h1{color:#00e5ff;text-shadow:0 0 12px #00e5ff;margin:0}.layout{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px}.door,.panel{background:#080d1c;border:1px solid #00e5ff55;border-radius:20px;padding:18px}.keypad{width:220px;height:300px;margin:40px auto;background:#111827;border:3px solid #00e5ff;border-radius:18px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:18px}.key{display:flex;align-items:center;justify-content:center;border:1px solid #00e5ff;border-radius:10px;color:#00e5ff;font-weight:bold}.lock{text-align:center;font-size:52px}.hud{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{background:#00e5ff14;border-radius:12px;text-align:center;padding:10px}.stat b{display:block;color:#faff00;font-size:24px}.scenario{font-size:21px;line-height:1.45;background:#0005;border-left:6px solid #ff0096;border-radius:12px;padding:14px;margin:14px 0}.choices{display:grid;gap:10px}button{border:0;background:#00e5ff;color:#07111f;border-radius:12px;padding:12px;font-weight:bold;cursor:pointer}button:hover{filter:brightness(1.1)}.feedback{min-height:72px;background:#0005;border-radius:12px;padding:12px;margin-top:12px;line-height:1.5}.lesson{color:#c6eaff;line-height:1.5}@media(max-width:800px){.layout{grid-template-columns:1fr}.hud{grid-template-columns:1fr}}</style></head><body><main class="room"><h1>Cyber Safety Escape Room</h1><p>Solve cyber safety puzzles to unlock the digital door.</p><section class="layout"><div class="door"><div class="keypad"><div class="key">1</div><div class="key">2</div><div class="key">3</div><div class="key">4</div><div class="key">5</div><div class="key">6</div><div class="key">7</div><div class="key">8</div><div class="key">9</div><div class="key">*</div><div class="key">0</div><div class="key">#</div></div><div class="lock" id="lock">🔒</div></div><div class="panel"><div class="hud"><div class="stat">Keys<b id="keys">0</b></div><div class="stat">Lives<b id="lives">3</b></div><div class="stat">Room<b id="roomNo">1</b></div></div><div class="scenario" id="scenario"></div><div class="choices" id="choices"></div><div class="feedback" id="feedback">Choose the safest action.</div><button onclick="next()">Next Room</button> <button onclick="resetGame()">Reset</button></div></section><p class="lesson"><b>Mini lesson:</b> Cyber safety means reducing risk: check links, use strong passwords, update software, and enable two-factor authentication.</p></main><script>const p=[['A bank email says click now or your account closes.','Check the bank website directly',['Click quickly','Reply with password','Check the bank website directly','Forward it'],'Urgent links are common phishing tactics.'],['Which password is strongest?','River!Cloud7Purple!Train',['password123','Rahim2005','qwerty','River!Cloud7Purple!Train'],'Long unpredictable passphrases are harder to guess.'],['A site asks for your login to get free game coins.','Leave the site',['Enter details','Use school password','Leave the site','Disable antivirus'],'Free reward scams often steal accounts.'],['Why is 2FA useful?','It adds a second proof of identity',['It shortens passwords','It deletes emails','It adds a second proof of identity','It removes thinking'],'A second factor can protect you if a password leaks.']];let keys=0,lives=3,i=0,answered=false;function render(){answered=false;let x=p[i%p.length];scenario.textContent=x[0];keysEl();roomNo.textContent=i%p.length+1;lock.textContent=keys>=p.length?'🔓':'🔒';feedback.textContent='Choose the safest action.';choices.innerHTML='';x[2].forEach(c=>{let b=document.createElement('button');b.textContent=c;b.onclick=()=>pick(c);choices.appendChild(b)})}function keysEl(){document.getElementById('keys').textContent=keys;document.getElementById('lives').textContent=lives}function pick(c){if(answered||lives<=0)return;answered=true;let x=p[i%p.length];if(c===x[1]){keys++;feedback.innerHTML='<b>Correct.</b> '+x[3]}else{lives--;feedback.innerHTML='<b>Unsafe.</b> Correct answer: '+x[1]+'. '+x[3];if(lives<=0)feedback.innerHTML+='<br><b>System locked.</b>'}keysEl();lock.textContent=keys>=p.length?'🔓':'🔒'}function next(){if(lives<=0)return;i++;render()}function resetGame(){keys=0;lives=3;i=0;render()}render();</script></body></html>
