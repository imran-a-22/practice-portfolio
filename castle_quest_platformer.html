<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Castle Quest Platformer</title>
  <style>
    :root {
      --bg1: #0f1226;
      --bg2: #1a2044;
      --stone: #7f7b82;
      --stone-dark: #5f5b61;
      --grass: #6ea44b;
      --gold: #f2c14e;
      --red: #b33a3a;
      --hud: rgba(8, 10, 18, 0.82);
      --text: #f6f1e9;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.06), transparent 18%),
        linear-gradient(180deg, #121630 0%, #111528 40%, #0a0d18 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .frame {
      width: min(1100px, 100%);
      display: grid;
      gap: 12px;
      justify-items: center;
    }

    canvas {
      width: min(100%, 1000px);
      height: auto;
      display: block;
      border: 4px solid #b89a62;
      border-radius: 14px;
      background: linear-gradient(180deg, #172040 0%, #33406c 58%, #2e2c35 100%);
      box-shadow: 0 18px 42px rgba(0,0,0,0.42);
    }

    .panel {
      width: min(100%, 1000px);
      background: rgba(16, 18, 28, 0.9);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 12px 16px;
      line-height: 1.45;
      font-size: 14px;
    }

    .panel strong { color: #ffd98b; }
    .panel span { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="frame">
    <canvas id="game" width="1000" height="560"></canvas>
    <div class="panel">
      <strong>Castle Quest Platformer</strong>
      <span>
        Move with <strong>A/D</strong> or <strong>←/→</strong>, jump with <strong>W</strong>, <strong>↑</strong>, or <strong>Space</strong>.
        Reach the banner, collect coins, and avoid spikes and goblins. Press <strong>R</strong> to restart the level and <strong>Enter</strong> after winning.
      </span>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const WIDTH = canvas.width;
    const HEIGHT = canvas.height;
    const GRAVITY = 0.6;
    const keys = Object.create(null);

    const camera = { x: 0 };

    const levels = [
      {
        name: "Outer Walls",
        width: 2200,
        player: { x: 80, y: 280 },
        platforms: [
          { x: 0, y: 470, w: 520, h: 90, type: "ground" },
          { x: 560, y: 430, w: 180, h: 130, type: "ground" },
          { x: 820, y: 385, w: 210, h: 175, type: "ground" },
          { x: 1120, y: 445, w: 260, h: 115, type: "ground" },
          { x: 1460, y: 390, w: 160, h: 170, type: "ground" },
          { x: 1680, y: 335, w: 170, h: 225, type: "ground" },
          { x: 1900, y: 285, w: 220, h: 275, type: "goal_base" },
          { x: 270, y: 360, w: 90, h: 18, type: "ledge" },
          { x: 670, y: 320, w: 70, h: 18, type: "ledge" },
          { x: 931, y: 285, w: 76, h: 18, type: "ledge" },
          { x: 1230, y: 335, w: 76, h: 18, type: "ledge" },
          { x: 1518, y: 295, w: 70, h: 18, type: "ledge" },
        ],
        spikes: [
          { x: 520, y: 450, w: 40, h: 20 },
          { x: 740, y: 450, w: 80, h: 20 },
          { x: 1380, y: 450, w: 80, h: 20 },
          { x: 1620, y: 450, w: 55, h: 20 }
        ],
        coins: [
          { x: 304, y: 325 }, { x: 705, y: 285 }, { x: 968, y: 248 },
          { x: 1268, y: 300 }, { x: 1545, y: 260 }, { x: 1760, y: 295 },
          { x: 1985, y: 245 }
        ],
        enemies: [
          { x: 1160, y: 415, w: 34, h: 30, minX: 1140, maxX: 1320, speed: 1.2 },
          { x: 1704, y: 305, w: 34, h: 30, minX: 1690, maxX: 1800, speed: 1.4 }
        ],
        goal: { x: 2032, y: 165, w: 26, h: 120 }
      },
      {
        name: "Moonlit Keep",
        width: 2450,
        player: { x: 80, y: 220 },
        platforms: [
          { x: 0, y: 470, w: 360, h: 90, type: "ground" },
          { x: 430, y: 420, w: 200, h: 140, type: "ground" },
          { x: 705, y: 365, w: 150, h: 195, type: "ground" },
          { x: 925, y: 310, w: 165, h: 250, type: "ground" },
          { x: 1170, y: 360, w: 185, h: 200, type: "ground" },
          { x: 1430, y: 425, w: 175, h: 135, type: "ground" },
          { x: 1665, y: 380, w: 180, h: 180, type: "ground" },
          { x: 1910, y: 330, w: 170, h: 230, type: "ground" },
          { x: 2145, y: 275, w: 220, h: 285, type: "goal_base" },
          { x: 194, y: 350, w: 75, h: 18, type: "ledge" },
          { x: 503, y: 305, w: 70, h: 18, type: "ledge" },
          { x: 760, y: 270, w: 70, h: 18, type: "ledge" },
          { x: 1215, y: 285, w: 70, h: 18, type: "ledge" },
          { x: 1708, y: 330, w: 86, h: 18, type: "ledge" },
        ],
        spikes: [
          { x: 360, y: 450, w: 70, h: 20 },
          { x: 630, y: 450, w: 75, h: 20 },
          { x: 1090, y: 450, w: 80, h: 20 },
          { x: 1355, y: 450, w: 75, h: 20 },
          { x: 1845, y: 450, w: 65, h: 20 }
        ],
        coins: [
          { x: 228, y: 316 }, { x: 538, y: 270 }, { x: 795, y: 235 },
          { x: 1007, y: 275 }, { x: 1248, y: 250 }, { x: 1520, y: 390 },
          { x: 1755, y: 295 }, { x: 1988, y: 295 }, { x: 2233, y: 238 }
        ],
        enemies: [
          { x: 952, y: 280, w: 34, h: 30, minX: 942, maxX: 1040, speed: 1.6 },
          { x: 1680, y: 350, w: 34, h: 30, minX: 1680, maxX: 1790, speed: 1.15 },
          { x: 1940, y: 300, w: 34, h: 30, minX: 1925, maxX: 2030, speed: 1.5 }
        ],
        goal: { x: 2270, y: 155, w: 26, h: 120 }
      },
      {
        name: "Throne Tower",
        width: 2660,
        player: { x: 70, y: 250 },
        platforms: [
          { x: 0, y: 470, w: 390, h: 90, type: "ground" },
          { x: 470, y: 420, w: 150, h: 140, type: "ground" },
          { x: 695, y: 370, w: 165, h: 190, type: "ground" },
          { x: 930, y: 320, w: 135, h: 240, type: "ground" },
          { x: 1140, y: 270, w: 135, h: 290, type: "ground" },
          { x: 1350, y: 320, w: 135, h: 240, type: "ground" },
          { x: 1560, y: 370, w: 165, h: 190, type: "ground" },
          { x: 1790, y: 420, w: 190, h: 140, type: "ground" },
          { x: 2060, y: 360, w: 170, h: 200, type: "ground" },
          { x: 2310, y: 300, w: 280, h: 260, type: "goal_base" },
          { x: 220, y: 350, w: 80, h: 18, type: "ledge" },
          { x: 525, y: 305, w: 75, h: 18, type: "ledge" },
          { x: 737, y: 255, w: 78, h: 18, type: "ledge" },
          { x: 958, y: 210, w: 76, h: 18, type: "ledge" },
          { x: 1169, y: 160, w: 78, h: 18, type: "ledge" },
          { x: 1380, y: 210, w: 76, h: 18, type: "ledge" },
          { x: 1608, y: 255, w: 76, h: 18, type: "ledge" },
          { x: 2120, y: 320, w: 76, h: 18, type: "ledge" }
        ],
        spikes: [
          { x: 390, y: 450, w: 80, h: 20 },
          { x: 620, y: 450, w: 75, h: 20 },
          { x: 1725, y: 450, w: 65, h: 20 },
          { x: 1980, y: 450, w: 80, h: 20 },
          { x: 2230, y: 450, w: 75, h: 20 }
        ],
        coins: [
          { x: 255, y: 316 }, { x: 560, y: 270 }, { x: 775, y: 220 },
          { x: 996, y: 175 }, { x: 1208, y: 125 }, { x: 1418, y: 175 },
          { x: 1644, y: 220 }, { x: 1860, y: 390 }, { x: 2160, y: 285 },
          { x: 2448, y: 265 }
        ],
        enemies: [
          { x: 715, y: 340, w: 34, h: 30, minX: 708, maxX: 820, speed: 1.3 },
          { x: 1578, y: 340, w: 34, h: 30, minX: 1570, maxX: 1685, speed: 1.45 },
          { x: 2085, y: 330, w: 34, h: 30, minX: 2075, maxX: 2195, speed: 1.65 }
        ],
        goal: { x: 2475, y: 180, w: 26, h: 120 }
      }
    ];

    const state = {
      levelIndex: 0,
      score: 0,
      totalDeaths: 0,
      gameWon: false,
      flashTimer: 0,
      message: ""
    };

    let currentLevel = null;
    let player = null;

    function cloneLevel(level) {
      return JSON.parse(JSON.stringify(level));
    }

    function loadLevel(index) {
      currentLevel = cloneLevel(levels[index]);
      player = {
        x: currentLevel.player.x,
        y: currentLevel.player.y,
        w: 32,
        h: 40,
        vx: 0,
        vy: 0,
        speed: 3.4,
        jumpPower: -11.7,
        onGround: false,
        facing: 1,
        coyote: 0,
        jumpBuffer: 0,
        invuln: 0
      };
      camera.x = 0;
      state.message = currentLevel.name;
      state.flashTimer = 80;
    }

    function resetRun() {
      state.levelIndex = 0;
      state.score = 0;
      state.totalDeaths = 0;
      state.gameWon = false;
      loadLevel(0);
    }

    function rectsOverlap(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function restartLevel(withDeath = true) {
      if (withDeath) state.totalDeaths += 1;
      loadLevel(state.levelIndex);
    }

    function updatePlayer() {
      const left = keys["ArrowLeft"] || keys["a"];
      const right = keys["ArrowRight"] || keys["d"];
      const jumpPressed = keys._jumpPressed;

      if (left && !right) {
        player.vx = -player.speed;
        player.facing = -1;
      } else if (right && !left) {
        player.vx = player.speed;
        player.facing = 1;
      } else {
        player.vx *= 0.78;
        if (Math.abs(player.vx) < 0.05) player.vx = 0;
      }

      if (jumpPressed) player.jumpBuffer = 8;
      else player.jumpBuffer = Math.max(0, player.jumpBuffer - 1);

      if (player.onGround) player.coyote = 8;
      else player.coyote = Math.max(0, player.coyote - 1);

      if (player.jumpBuffer > 0 && player.coyote > 0) {
        player.vy = player.jumpPower;
        player.onGround = false;
        player.coyote = 0;
        player.jumpBuffer = 0;
      }

      player.vy += GRAVITY;
      if (player.vy > 14) player.vy = 14;

      player.x += player.vx;
      resolveCollisions("x");
      player.y += player.vy;
      player.onGround = false;
      resolveCollisions("y");

      if (player.invuln > 0) player.invuln--;

      if (player.y > HEIGHT + 250) restartLevel(true);
      camera.x = clamp(player.x - WIDTH * 0.35, 0, currentLevel.width - WIDTH);
    }

    function resolveCollisions(axis) {
      for (const p of currentLevel.platforms) {
        if (!rectsOverlap(player, p)) continue;

        if (axis === "x") {
          if (player.vx > 0) player.x = p.x - player.w;
          if (player.vx < 0) player.x = p.x + p.w;
          player.vx = 0;
        } else {
          if (player.vy > 0) {
            player.y = p.y - player.h;
            player.vy = 0;
            player.onGround = true;
          } else if (player.vy < 0) {
            player.y = p.y + p.h;
            player.vy = 0;
          }
        }
      }
    }

    function updateCoins() {
      currentLevel.coins = currentLevel.coins.filter((coin) => {
        const box = { x: coin.x - 10, y: coin.y - 10, w: 20, h: 20 };
        if (rectsOverlap(player, box)) {
          state.score += 10;
          state.flashTimer = 14;
          return false;
        }
        return true;
      });
    }

    function updateEnemies() {
      for (const e of currentLevel.enemies) {
        e.x += e.speed;
        if (e.x <= e.minX || e.x + e.w >= e.maxX) e.speed *= -1;

        if (rectsOverlap(player, e)) {
          const stomp = player.vy > 2 && player.y + player.h - e.y < 18;
          if (stomp) {
            player.vy = -8.5;
            e.dead = true;
            state.score += 25;
          } else if (player.invuln <= 0) {
            restartLevel(true);
            return;
          }
        }
      }
      currentLevel.enemies = currentLevel.enemies.filter((e) => !e.dead);
    }

    function updateHazards() {
      for (const s of currentLevel.spikes) {
        if (rectsOverlap(player, s)) {
          restartLevel(true);
          return;
        }
      }
    }

    function updateGoal() {
      if (rectsOverlap(player, currentLevel.goal)) {
        state.levelIndex += 1;
        if (state.levelIndex >= levels.length) {
          state.gameWon = true;
          state.message = "The kingdom is safe.";
          state.flashTimer = 180;
        } else {
          loadLevel(state.levelIndex);
        }
      }
    }

    function update() {
      if (state.gameWon) return;
      updatePlayer();
      updateCoins();
      updateEnemies();
      updateHazards();
      updateGoal();
      keys._jumpPressed = false;
      if (state.flashTimer > 0) state.flashTimer--;
    }

    function drawBackground() {
      const sky = ctx.createLinearGradient(0, 0, 0, HEIGHT);
      sky.addColorStop(0, "#19224d");
      sky.addColorStop(0.55, "#31436d");
      sky.addColorStop(1, "#564338");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      drawMoon();
      drawStars();
      drawParallaxHills(0.18, 360, "#1f2748", 70);
      drawParallaxHills(0.32, 400, "#2a3557", 90);
      drawCastleSilhouettes();
    }

    function drawMoon() {
      ctx.save();
      ctx.globalAlpha = 0.92;
      ctx.fillStyle = "#f0e6c8";
      ctx.beginPath();
      ctx.arc(830, 95, 38, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 0.14;
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(848, 82, 40, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawStars() {
      ctx.fillStyle = "rgba(255,255,255,0.85)";
      for (let i = 0; i < 55; i++) {
        const x = (i * 197 % WIDTH);
        const y = (i * 61 % 180);
        const r = (i % 3) + 1;
        ctx.fillRect(x, y, r, r);
      }
    }

    function drawParallaxHills(factor, baseY, color, amp) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(0, HEIGHT);
      for (let x = 0; x <= WIDTH; x += 20) {
        const worldX = x + camera.x * factor;
        const y = baseY + Math.sin(worldX * 0.009) * amp + Math.sin(worldX * 0.018) * amp * 0.45;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(WIDTH, HEIGHT);
      ctx.closePath();
      ctx.fill();
    }

    function drawCastleSilhouettes() {
      const baseX = -camera.x * 0.22 + 120;
      ctx.fillStyle = "rgba(14,17,32,0.88)";
      for (let i = 0; i < 4; i++) {
        const x = baseX + i * 210;
        ctx.fillRect(x, 220 + (i % 2) * 25, 60, 170);
        ctx.fillRect(x + 18, 180 + (i % 2) * 18, 24, 40);
        ctx.beginPath();
        ctx.moveTo(x + 30, 150 + (i % 2) * 18);
        ctx.lineTo(x + 12, 180 + (i % 2) * 18);
        ctx.lineTo(x + 48, 180 + (i % 2) * 18);
        ctx.closePath();
        ctx.fill();
      }
      ctx.fillRect(baseX - 40, 320, 900, 28);
    }

    function drawPlatforms() {
      for (const p of currentLevel.platforms) {
        const x = p.x - camera.x;
        const y = p.y;
        ctx.fillStyle = p.type === "ledge" ? "#88755e" : "#726f76";
        ctx.fillRect(x, y, p.w, p.h);

        ctx.fillStyle = p.type === "ledge" ? "#b49b78" : "#939099";
        ctx.fillRect(x, y, p.w, Math.min(10, p.h));

        if (p.type !== "ledge") {
          for (let bx = 0; bx < p.w; bx += 36) {
            ctx.strokeStyle = "rgba(60,55,64,0.5)";
            ctx.strokeRect(x + bx, y + 10, 36, Math.max(20, p.h - 10));
          }
          ctx.fillStyle = "#5d8940";
          ctx.fillRect(x, y - 4, p.w, 6);
        }
      }
    }

    function drawSpikes() {
      for (const s of currentLevel.spikes) {
        const x = s.x - camera.x;
        ctx.fillStyle = "#c8c9d2";
        const count = Math.max(2, Math.floor(s.w / 14));
        const step = s.w / count;
        for (let i = 0; i < count; i++) {
          ctx.beginPath();
          ctx.moveTo(x + i * step, s.y + s.h);
          ctx.lineTo(x + i * step + step / 2, s.y);
          ctx.lineTo(x + (i + 1) * step, s.y + s.h);
          ctx.closePath();
          ctx.fill();
        }
      }
    }

    function drawCoins() {
      for (const c of currentLevel.coins) {
        const x = c.x - camera.x;
        const bob = Math.sin((performance.now() / 180) + c.x * 0.01) * 3;
        ctx.fillStyle = "#f4d060";
        ctx.beginPath();
        ctx.arc(x, c.y + bob, 9, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#b78722";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = "rgba(255,255,255,0.35)";
        ctx.fillRect(x - 2, c.y - 5 + bob, 4, 10);
      }
    }

    function drawEnemies() {
      for (const e of currentLevel.enemies) {
        const x = e.x - camera.x;
        ctx.fillStyle = "#476c39";
        ctx.fillRect(x, e.y + 10, e.w, e.h - 10);
        ctx.fillStyle = "#6d9a55";
        ctx.fillRect(x + 3, e.y, e.w - 6, 18);
        ctx.fillStyle = "#e9e7e0";
        ctx.fillRect(x + 8, e.y + 5, 4, 4);
        ctx.fillRect(x + 22, e.y + 5, 4, 4);
        ctx.fillStyle = "#2b2b2b";
        ctx.fillRect(x + 10, e.y + 24, 5, 8);
        ctx.fillRect(x + 20, e.y + 24, 5, 8);
        ctx.fillStyle = "#7b4d2a";
        ctx.fillRect(x + 2, e.y + 14, e.w - 4, 4);
      }
    }

    function drawGoal() {
      const g = currentLevel.goal;
      const x = g.x - camera.x;
      ctx.fillStyle = "#bba071";
      ctx.fillRect(x, g.y, 6, g.h);
      ctx.fillStyle = "#9f2436";
      ctx.beginPath();
      ctx.moveTo(x + 6, g.y + 8);
      ctx.lineTo(x + 48, g.y + 24);
      ctx.lineTo(x + 6, g.y + 40);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = "#6d1521";
      ctx.stroke();
    }

    function drawPlayer() {
      const blink = player.invuln > 0 && Math.floor(player.invuln / 3) % 2 === 0;
      if (blink) return;
      const x = player.x - camera.x;
      const y = player.y;

      ctx.fillStyle = "#455a7a";
      ctx.fillRect(x + 8, y + 8, 16, 18);
      ctx.fillStyle = "#d3d6de";
      ctx.fillRect(x + 5, y + 8, 22, 18);
      ctx.fillStyle = "#7f1f1f";
      ctx.fillRect(x + (player.facing === 1 ? 18 : 8), y + 10, 10, 24);
      ctx.fillStyle = "#f0d6b0";
      ctx.fillRect(x + 9, y, 14, 11);
      ctx.fillStyle = "#3b2513";
      ctx.fillRect(x + 6, y - 4, 20, 5);
      ctx.fillStyle = "#2a2a2a";
      ctx.fillRect(x + 9, y + 26, 6, 14);
      ctx.fillRect(x + 18, y + 26, 6, 14);
      ctx.fillRect(x + 4, y + 12, 5, 12);
      ctx.fillRect(x + 23, y + 12, 5, 12);
      ctx.strokeStyle = "#d7dbe6";
      ctx.lineWidth = 2;
      const swordX = player.facing === 1 ? x + 29 : x + 3;
      ctx.beginPath();
      ctx.moveTo(swordX, y + 12);
      ctx.lineTo(swordX + (player.facing === 1 ? 10 : -10), y + 2);
      ctx.stroke();
    }

    function drawTorches() {
      for (let i = 0; i < currentLevel.platforms.length; i++) {
        const p = currentLevel.platforms[i];
        if (p.type === "ledge" || p.w < 150 || i % 2 !== 0) continue;
        const x = p.x + 22 - camera.x;
        const y = p.y - 18;
        if (x < -20 || x > WIDTH + 20) continue;
        ctx.fillStyle = "#7b5a37";
        ctx.fillRect(x, y, 4, 16);
        const flameWobble = Math.sin(performance.now() / 90 + i) * 2;
        ctx.fillStyle = "rgba(255,180,70,0.22)";
        ctx.beginPath();
        ctx.arc(x + 2, y - 3, 20 + flameWobble, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#ff9d2e";
        ctx.beginPath();
        ctx.moveTo(x + 2, y - 15);
        ctx.quadraticCurveTo(x + 12, y - 5, x + 2, y + 1);
        ctx.quadraticCurveTo(x - 8, y - 5, x + 2, y - 15);
        ctx.fill();
      }
    }

    function drawHUD() {
      ctx.save();
      ctx.fillStyle = "rgba(10, 12, 20, 0.74)";
      ctx.fillRect(18, 16, 360, 78);
      ctx.strokeStyle = "rgba(255,255,255,0.08)";
      ctx.strokeRect(18, 16, 360, 78);
      ctx.fillStyle = "#f5efe4";
      ctx.font = "bold 22px Georgia";
      ctx.fillText("Castle Quest", 34, 42);
      ctx.font = "16px Georgia";
      ctx.fillText(`Stage: ${state.levelIndex + 1}/${levels.length} - ${levels[Math.min(state.levelIndex, levels.length - 1)].name}`, 34, 66);
      ctx.fillText(`Score: ${state.score}   Deaths: ${state.totalDeaths}`, 34, 87);
      ctx.restore();

      if (state.flashTimer > 0 && state.message) {
        ctx.save();
        ctx.globalAlpha = Math.min(1, state.flashTimer / 30);
        ctx.fillStyle = "rgba(14, 11, 22, 0.8)";
        ctx.fillRect(WIDTH / 2 - 155, 112, 310, 44);
        ctx.strokeStyle = "rgba(255,255,255,0.12)";
        ctx.strokeRect(WIDTH / 2 - 155, 112, 310, 44);
        ctx.fillStyle = "#ffe4a0";
        ctx.font = "bold 22px Georgia";
        ctx.textAlign = "center";
        ctx.fillText(state.message, WIDTH / 2, 141);
        ctx.restore();
        ctx.textAlign = "left";
      }
    }

    function drawWinOverlay() {
      ctx.save();
      ctx.fillStyle = "rgba(8, 10, 18, 0.78)";
      ctx.fillRect(0, 0, WIDTH, HEIGHT);
      ctx.fillStyle = "#f6ead1";
      ctx.textAlign = "center";
      ctx.font = "bold 42px Georgia";
      ctx.fillText("You reclaimed the castle.", WIDTH / 2, 180);
      ctx.font = "24px Georgia";
      ctx.fillText(`Final Score: ${state.score}`, WIDTH / 2, 235);
      ctx.fillText(`Total Deaths: ${state.totalDeaths}`, WIDTH / 2, 272);
      ctx.font = "20px Georgia";
      ctx.fillStyle = "#ffd98b";
      ctx.fillText("Press Enter to begin a new run", WIDTH / 2, 334);
      ctx.restore();
      ctx.textAlign = "left";
    }

    function draw() {
      drawBackground();
      drawPlatforms();
      drawSpikes();
      drawGoal();
      drawCoins();
      drawEnemies();
      drawTorches();
      drawPlayer();
      drawHUD();
      if (state.gameWon) drawWinOverlay();
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener("keydown", (e) => {
      const key = e.key.length === 1 ? e.key.toLowerCase() : e.key;
      keys[key] = true;

      if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(e.key)) {
        e.preventDefault();
      }

      if (key === " " || key === "ArrowUp" || key === "w") {
        keys._jumpPressed = true;
      }
      if (key === "r") {
        if (state.gameWon) resetRun();
        else restartLevel(false);
      }
      if (key === "Enter" && state.gameWon) {
        resetRun();
      }
    });

    window.addEventListener("keyup", (e) => {
      const key = e.key.length === 1 ? e.key.toLowerCase() : e.key;
      keys[key] = false;
    });

    resetRun();
    loop();
  </script>
</body>
</html>
